<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketplace - EIEI</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
  <!-- Firebase SDK (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
  <script src="components/firebase-init.js"></script>

  <style>
    .marketplace-container {
      min-height: 100vh;
      background: var(--bg);
      padding-top: 120px;
      padding-bottom: 40px;
    }

    .marketplace-header {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem 3rem 2rem;
      text-align: center;
      border-bottom: 2px solid var(--border);
    }

    .marketplace-header h1 {
      color: var(--brand-blue);
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .marketplace-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    .marketplace-filters {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .marketplace-filters input {
      padding: 0.7rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--card-bg);
      color: var(--text);
      flex: 1;
      min-width: 250px;
    }

    .marketplace-filters input::placeholder {
      color: var(--text-muted);
    }

    .marketplace-items {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 2rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 2rem;
    }

    .marketplace-item {
      background: var(--card-bg);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.08);
      border: 1px solid var(--border);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .marketplace-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }

    .marketplace-item-image {
      width: 100%;
      height: 220px;
      background: linear-gradient(135deg, var(--brand-blue), var(--brand-orange));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 3rem;
      overflow: hidden;
    }

    .marketplace-item-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .marketplace-item-content {
      padding: 1.5rem;
    }

    .marketplace-item-category {
      color: var(--brand-orange);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .marketplace-item-title {
      color: var(--brand-blue);
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .marketplace-item-description {
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .marketplace-item-price {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .price-tag {
      color: var(--brand-orange);
      font-size: 1.3rem;
      font-weight: 700;
    }

    .marketplace-item-footer {
      display: flex;
      gap: 0.5rem;
    }

    .marketplace-item-footer button {
      flex: 1;
      padding: 0.6rem 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .btn-view {
      background: var(--brand-blue);
      color: white;
    }

    .btn-view:hover {
      opacity: 0.9;
    }

    .btn-contact {
      background: var(--brand-orange);
      color: white;
    }

    .btn-contact:hover {
      opacity: 0.9;
    }

    .marketplace-empty {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .marketplace-empty h3 {
      color: var(--text);
      margin-bottom: 1rem;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.4);
      animation: fadeIn 0.3s ease;
    }

    .modal.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--card-bg);
      padding: 2rem;
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
    }

    .modal-header h2 {
      color: var(--brand-blue);
      margin: 0;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .close-btn:hover {
      color: var(--text);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text);
      font-weight: 600;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      background: var(--bg);
      color: var(--text);
      box-sizing: border-box;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--brand-blue);
      box-shadow: 0 0 0 3px rgba(29, 78, 216, 0.1);
    }

    .modal-footer {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
    }

    .modal-footer button {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s ease;
    }

    .btn-submit {
      background: var(--brand-blue);
      color: white;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .btn-cancel {
      background: var(--border);
      color: var(--text);
    }

    .btn-cancel:hover {
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .marketplace-header h1 {
        font-size: 1.8rem;
      }

      .marketplace-items {
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1rem;
        padding: 0 1rem;
      }

      .marketplace-filters {
        padding: 0 1rem;
        flex-direction: column;
      }

      .marketplace-filters input {
        min-width: auto;
      }

      .modal-content {
        width: 95%;
        padding: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header-container"></div>

  <!-- MARKETPLACE SECTION -->
  <section class="marketplace-container">
    <div class="marketplace-header">
      <h1>Marketplace</h1>
      <p>Discover resources, materials, and services from EIEI</p>
    </div>

    <div class="marketplace-filters">
      <input 
        type="text" 
        id="searchInput" 
        placeholder="Search for items..." 
        onkeyup="filterItems()"
      >
    </div>

    <div class="marketplace-items" id="itemsContainer">
      <div style="grid-column: 1/-1; text-align: center; padding: 2rem; color: var(--text-muted);">
        Loading marketplace items...
      </div>
    </div>
  </section>

  <!-- ITEM DETAILS MODAL -->
  <div id="itemModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="modalTitle">Item Details</h2>
        <button class="close-btn" onclick="closeItemModal()">&times;</button>
      </div>
      <div id="modalBody">
        <p>Loading...</p>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <div id="footer-container"></div>

  <script src="components/header.js"></script>
  <script src="components/footer.js"></script>
  <script src="script.js"></script>

  <script>
    // Load header and footer
    document.getElementById('header-container').innerHTML = createHeader();
    document.getElementById('footer-container').innerHTML = createFooter();

    let allItems = [];

    // Load marketplace items
    async function loadMarketplaceItems() {
      try {
        const snapshot = await window.firebaseDB.collection('marketplace').orderBy('createdAt', 'desc').get();
        
        allItems = [];
        snapshot.forEach(doc => {
          allItems.push({ id: doc.id, ...doc.data() });
        });

        displayItems(allItems);
      } catch (error) {
        console.error('Error loading items:', error);
        document.getElementById('itemsContainer').innerHTML = `
          <div style="grid-column: 1/-1; text-align: center; padding: 2rem;">
            <p style="color: var(--text-muted);">Unable to load marketplace items. Please try again later.</p>
          </div>
        `;
      }
    }

    function displayItems(items) {
      const container = document.getElementById('itemsContainer');
      
      if (items.length === 0) {
        container.innerHTML = `
          <div class="marketplace-empty" style="grid-column: 1/-1;">
            <h3>No items found</h3>
            <p>Check back soon for new items!</p>
          </div>
        `;
        return;
      }

      container.innerHTML = items.map(item => `
        <div class="marketplace-item">
          <div class="marketplace-item-image">
            ${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title}">` : '📦'}
          </div>
          <div class="marketplace-item-content">
            <div class="marketplace-item-category">${item.category || 'General'}</div>
            <div class="marketplace-item-title">${item.title}</div>
            <div class="marketplace-item-description">${item.description}</div>
            <div class="marketplace-item-price">
              <span class="price-tag">$${parseFloat(item.price).toFixed(2)}</span>
            </div>
            <div class="marketplace-item-footer">
              <button class="btn-view" onclick="viewItemDetails('${item.id}')">View Details</button>
              <button class="btn-contact" onclick="contactSeller('${item.id}')">Contact</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function filterItems() {
      const searchTerm = document.getElementById('searchInput').value.toLowerCase();
      const filtered = allItems.filter(item => 
        item.title.toLowerCase().includes(searchTerm) ||
        item.description.toLowerCase().includes(searchTerm) ||
        (item.category || '').toLowerCase().includes(searchTerm)
      );
      displayItems(filtered);
    }

    function viewItemDetails(itemId) {
      const item = allItems.find(i => i.id === itemId);
      if (!item) return;

      const modalBody = document.getElementById('modalBody');
      modalBody.innerHTML = `
        <div style="text-align: center;">
          <div style="width: 100%; height: 300px; background: linear-gradient(135deg, var(--brand-blue), var(--brand-orange)); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white; font-size: 4rem; margin-bottom: 1.5rem; overflow: hidden;">
            ${item.imageUrl ? `<img src="${item.imageUrl}" alt="${item.title}" style="width: 100%; height: 100%; object-fit: cover;">` : '📦'}
          </div>
        </div>
        <div style="margin-bottom: 1.5rem;">
          <p style="color: var(--brand-orange); font-weight: 600; text-transform: uppercase; font-size: 0.85rem; margin-bottom: 0.5rem;">${item.category || 'General'}</p>
          <h3 style="color: var(--brand-blue); margin: 0 0 0.5rem 0;">${item.title}</h3>
          <p style="color: var(--text); margin: 0; line-height: 1.6;">${item.description}</p>
        </div>
        <div style="background: var(--bg-alt); padding: 1.5rem; border-radius: 12px; margin-bottom: 1.5rem;">
          <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0 0 0.5rem 0;">Price</p>
          <p style="color: var(--brand-orange); font-size: 1.8rem; font-weight: 700; margin: 0;">$${parseFloat(item.price).toFixed(2)}</p>
        </div>
        ${item.contactEmail ? `<div style="color: var(--text-muted); font-size: 0.9rem;">Contact: ${item.contactEmail}</div>` : ''}
        ${item.availability ? `<div style="color: var(--text); margin-top: 1rem;"><strong>Availability:</strong> ${item.availability}</div>` : ''}
      `;

      document.getElementById('itemModal').classList.add('active');
    }

    function closeItemModal() {
      document.getElementById('itemModal').classList.remove('active');
    }

    function contactSeller(itemId) {
      const item = allItems.find(i => i.id === itemId);
      if (!item || !item.contactEmail) {
        alert('Contact information not available');
        return;
      }
      window.location.href = `mailto:${item.contactEmail}?subject=Interested in: ${item.title}`;
    }

    // Close modal when clicking outside
    document.getElementById('itemModal').addEventListener('click', function(event) {
      if (event.target === this) {
        closeItemModal();
      }
    });

    // Load items on page load
    window.addEventListener('load', loadMarketplaceItems);
  </script>
  <script src="components/firebase-init.js"></script>
  <script src="components/chat-widget.js"></script>
</body>
</html>
