<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0f4ff" rx="20"/>
  
  <!-- Gradient def -->
  <defs>
    <linearGradient id="partnerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Two organizations (circles with hands) -->
  <g fill="url(#partnerGrad)" opacity="0.8">
    <circle cx="60" cy="100" r="30"/>
  </g>
  
  <g fill="#ff8c00" opacity="0.8">
    <circle cx="140" cy="100" r="30"/>
  </g>
  
  <!-- Handshake bridge -->
  <g stroke="#667eea" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M 85 95 Q 100 85 115 95"/>
    <path d="M 85 105 Q 100 115 115 105"/>
  </g>
  
  <!-- Center connection point -->
  <circle cx="100" cy="100" r="5" fill="#667eea"/>
  
  <!-- Plus signs (collaboration) -->
  <g stroke="#ff8c00" stroke-width="2" stroke-linecap="round">
    <line x1="40" y1="60" x2="40" y2="75"/>
    <line x1="32" y1="67" x2="48" y2="67"/>
  </g>
  
  <g stroke="#667eea" stroke-width="2" stroke-linecap="round">
    <line x1="160" y1="60" x2="160" y2="75"/>
    <line x1="152" y1="67" x2="168" y2="67"/>
  </g>
</svg>