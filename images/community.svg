<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0f4ff" rx="20"/>
  
  <!-- Gradient def -->
  <defs>
    <linearGradient id="communityGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Three people circles -->
  <g fill="url(#communityGrad)">
    <!-- Center person (larger) -->
    <circle cx="100" cy="60" r="20"/>
    
    <!-- Left person -->
    <circle cx="60" cy="100" r="16"/>
    
    <!-- Right person -->
    <circle cx="140" cy="100" r="16"/>
  </g>
  
  <!-- Connection lines -->
  <g stroke="#ff8c00" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="88" y1="72" x2="68" y2="92"/>
    <line x1="112" y1="72" x2="132" y2="92"/>
    <line x1="80" y1="110" x2="120" y2="110"/>
  </g>
  
  <!-- Hands together symbol -->
  <g transform="translate(100, 150)" fill="#667eea" opacity="0.3">
    <path d="M -15 0 Q -10 -10 0 -10 Q 10 -10 15 0"/>
  </g>
</svg>