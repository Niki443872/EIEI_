<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0f4ff" rx="20"/>
  
  <!-- Gradient def -->
  <defs>
    <linearGradient id="earlyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Child figure (larger, center) -->
  <g fill="url(#earlyGrad)">
    <circle cx="100" cy="70" r="18"/>
    <ellipse cx="100" cy="105" rx="22" ry="28"/>
  </g>
  
  <!-- Two supporting figures on sides -->
  <g fill="#ff8c00" opacity="0.7">
    <circle cx="55" cy="85" r="12"/>
    <ellipse cx="55" cy="115" rx="14" ry="18"/>
  </g>
  
  <g fill="#ff8c00" opacity="0.7">
    <circle cx="145" cy="85" r="12"/>
    <ellipse cx="145" cy="115" rx="14" ry="18"/>
  </g>
  
  <!-- Heart symbol (support) -->
  <g transform="translate(100, 150)" fill="#667eea">
    <path d="M 0 -8 C -5 -13 -12 -13 -12 -6 C -12 0 0 8 0 8 C 0 8 12 0 12 -6 C 12 -13 5 -13 0 -8 Z"/>
  </g>
</svg>