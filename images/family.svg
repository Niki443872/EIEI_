<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="200" height="200" fill="#f0f4ff" rx="20"/>
  
  <!-- Gradient def -->
  <defs>
    <linearGradient id="familyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Adult 1 (left) -->
  <g fill="url(#familyGrad)">
    <circle cx="50" cy="50" r="14"/>
    <ellipse cx="50" cy="85" rx="18" ry="22"/>
  </g>
  
  <!-- Child (center) -->
  <g fill="#ff8c00">
    <circle cx="100" cy="65" r="12"/>
    <ellipse cx="100" cy="100" rx="15" ry="20"/>
  </g>
  
  <!-- Adult 2 (right) -->
  <g fill="url(#familyGrad)">
    <circle cx="150" cy="50" r="14"/>
    <ellipse cx="150" cy="85" rx="18" ry="22"/>
  </g>
  
  <!-- Holding hands lines -->
  <g stroke="#ff8c00" stroke-width="2.5" stroke-linecap="round" fill="none">
    <line x1="63" y1="100" x2="85" y2="105"/>
    <line x1="137" y1="105" x2="115" y2="100"/>
  </g>
  
  <!-- Home roof symbol -->
  <g transform="translate(100, 140)" stroke="#667eea" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M -12 5 L 0 -5 L 12 5"/>
  </g>
</svg>